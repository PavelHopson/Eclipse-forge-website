    <title>Eclipse Forge — Кузница IT-решений</title>
    <script>
      // Pre-hydration theme setter — avoids flash of wrong theme on first paint.
      // Reads stored mode, defaults to 'auto' (time-based: 06:00-18:00 = light).
      (function () {
        try {
          var mode = localStorage.getItem('ef-theme-mode') || 'auto';
          var resolved = mode;
          if (mode === 'auto') {
            var h = new Date().getHours();
            resolved = (h >= 6 && h < 18) ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
